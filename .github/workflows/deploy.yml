name: Otomatik Sunucu Deploy

on:
  push:
    branches:
      - main  # Hangi branch'e push atınca çalışmasını istiyorsan (örn: master veya main)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sunucuya SSH ile bağlan ve komutları çalıştır
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Backend Güncelleme
            cd /root/.openclaw/workspace/barberappBackend
            git pull origin main
            npm install
            pm2 restart all
            echo "⚙️ Backend başarıyla güncellendi!"

            # 2. Frontend Güncelleme
            cd /root/.openclaw/workspace/barberappFront
            git pull origin main

            # Frontend env dosyasini her deploy'da secrets ile olustur
            cat > .env <<EOF
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
            EOF

            if [ -z "${{ secrets.VITE_FIREBASE_API_KEY }}" ] || [ -z "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" ] || [ -z "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" ] || [ -z "${{ secrets.VITE_FIREBASE_APP_ID }}" ] || [ -z "${{ secrets.VITE_FIREBASE_VAPID_KEY }}" ]; then
              echo "❌ Frontend Firebase secrets eksik. GitHub Secrets'i kontrol edin."
              exit 1
            fi

            npm install
            npm run build
            rm -rf /var/www/reservos/*
            cp -r dist/* /var/www/reservos/
            systemctl reload nginx
            echo "🎨 Frontend başarıyla güncellendi!"